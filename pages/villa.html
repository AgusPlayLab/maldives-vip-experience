<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in en la Villa - Maldives VIP Experience</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <div class="experience-page">
        <div class="experience-header">
            <div class="icon">🏝️</div>
            <h1>Check-in en la Villa</h1>
            <p>Tu hogar sobre el agua. Lujo y tranquilidad en perfecta armonía.</p>
        </div>
        
        <div id="gamesContainer" class="games-grid"></div>
        
        <button id="btnCompletarExp" class="btn-primary btn-completar-experiencia">
            Acomodarse en la villa
        </button>
    </div>
    
    <script src="../js/experiencias.js"></script>
    <script src="../js/shared.js"></script>
    <script>
        const EXPERIENCIA_ID = 'checkin';
        const EXP_INDEX = 2;
        
        document.addEventListener('DOMContentLoaded', () => {
            crearNavegacion('🏝️ Villa');
            cargarJuegos();
            document.getElementById('btnCompletarExp').addEventListener('click', () => {
                marcarExperienciaCompletada(EXP_INDEX);
                mostrarNotificacion('¡Bienvenido a tu villa! 🎉');
                setTimeout(() => window.location.href = '../index.html', 1500);
            });
        });
        
        function cargarJuegos() {
            const exp = experiencias.find(e => e.id === EXPERIENCIA_ID);
            if (!exp || !exp.games) return;
            const container = document.getElementById('gamesContainer');
            exp.games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                if (juegoEstaCompletado(EXPERIENCIA_ID, index)) card.classList.add('completed');
                card.innerHTML = `
                    ${game.image ? `<img src="${game.image}" alt="${game.title}" class="game-image">` : ''}
                    <div class="game-info">
                        <h3>${game.title}</h3>
                        <p>${game.description}</p>
                    </div>
                `;
                card.addEventListener('click', () => abrirJuego(game, index));
                container.appendChild(card);
            });
        }
        
        function abrirJuego(game, index) {
            abrirModal(game.title, crearContenidoJuego(game), () => {
                marcarJuegoCompletado(EXPERIENCIA_ID, index);
                mostrarNotificacion('¡Actividad completada! 🎉');
                setTimeout(() => location.reload(), 800);
            });
        }
    </script>
</body>
</html>
