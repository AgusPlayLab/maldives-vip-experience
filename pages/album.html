<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum del Viaje - Maldives VIP Experience</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <div class="experience-page">
        <div class="experience-header">
            <div class="icon">📸</div>
            <h1>Álbum del Viaje</h1>
            <p>Recuerdos capturados. Las mejores fotos de tu aventura en las Maldivas.</p>
        </div>
        
        <div class="photo-gallery">
            <!-- La galería se genera dinámicamente -->
        </div>
        
        <button id="btnCompletarExp" class="btn-primary btn-completar-experiencia">
            Guardar recuerdos
        </button>
    </div>
    
    <script src="../js/experiencias.js"></script>
    <script src="../js/shared.js"></script>
    <script>
        const EXP_INDEX = 7;
        
        document.addEventListener('DOMContentLoaded', () => {
            crearNavegacion('📸 Álbum del Viaje');
            cargarGaleria();
            
            document.getElementById('btnCompletarExp').addEventListener('click', () => {
                marcarExperienciaCompletada(EXP_INDEX);
                mostrarNotificacion('¡Recuerdos guardados! 💙');
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);
            });
        });
        
        function cargarGaleria() {
            const gallery = document.querySelector('.photo-gallery');
            
            memoriasViaje.forEach(memoria => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                photoItem.innerHTML = `
                    <img src="${memoria.image}" alt="${memoria.caption}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%2340E0D0%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2224%22 fill=%22white%22%3E${memoria.caption}%3C/text%3E%3C/svg%3E'">
                    <div class="photo-caption">${memoria.caption}</div>
                `;
                gallery.appendChild(photoItem);
            });
        }
    </script>
    
</body>
</html>
